<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>mProtocol | Private P2P Web-Messenger</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

    <style>
        :root {
            --bg-dark: #050505;
            --glass-bg: rgba(20, 20, 22, 0.65);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-highlight: rgba(255, 255, 255, 0.15);
            --text-main: #f2f2f2;
            --text-muted: #8a8a8e;
            --accent: #ffffff;
            --accent-glow: rgba(255, 255, 255, 0.2);
            --danger: #ff453a;
            --success: #32d74b;
            --warning: #ffd60a;
            
            --font-sans: 'Inter', -apple-system, sans-serif;
            --font-mono: 'Fira Code', monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-dark);
            font-family: var(--font-sans);
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            position: relative;
        }

        /* Анимированный фон (эффект свечения под стеклом) */
        .ambient-bg {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            overflow: hidden;
            z-index: 0;
            pointer-events: none;
        }
        .ambient-blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            animation: float 20s infinite ease-in-out alternate;
        }
        .blob-1 {
            width: 400px; height: 400px;
            background: rgba(255, 255, 255, 0.05);
            top: -100px; left: -100px;
        }
        .blob-2 {
            width: 500px; height: 500px;
            background: rgba(255, 255, 255, 0.03);
            bottom: -200px; right: -100px;
            animation-delay: -10s;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(30px, 50px) scale(1.1); }
        }

        /* Главный контейнер (Жидкое стекло) */
        .app-container {
            width: 100%;
            max-width: 480px;
            height: 90vh;
            max-height: 850px;
            background: var(--glass-bg);
            backdrop-filter: blur(40px) saturate(150%);
            -webkit-backdrop-filter: blur(40px) saturate(150%);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 10;
            box-shadow: 0 30px 60px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.1);
            overflow: hidden;
        }

        /* Шапка */
        .header {
            padding: 20px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--glass-border);
            background: rgba(0, 0, 0, 0.2);
        }

        .brand-title {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .brand-title h1 {
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .ping-indicator {
            font-family: var(--font-mono);
            font-size: 0.65rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 6px;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .ping-indicator.visible { opacity: 1; }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(0,0,0,0.4);
            padding: 6px 12px;
            border-radius: 30px;
            border: 1px solid var(--glass-border);
            font-family: var(--font-mono);
            font-size: 0.7rem;
            letter-spacing: 0.05em;
        }

        .status-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--danger);
            box-shadow: 0 0 8px var(--danger);
            transition: all 0.3s;
        }
        .status-dot.active { background: var(--success); box-shadow: 0 0 10px var(--success); }
        .status-dot.waiting { background: var(--warning); box-shadow: 0 0 10px var(--warning); animation: pulse 1.5s infinite; }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }

        /* Экраны */
        .screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 32px 24px;
            overflow-y: auto;
            position: absolute;
            top: 70px; left: 0; right: 0; bottom: 0;
            opacity: 0;
            pointer-events: none;
            transform: translateY(10px);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        .screen.active {
            opacity: 1;
            pointer-events: all;
            transform: translateY(0);
            position: relative;
            top: 0;
        }

        /* Типографика и элементы */
        .title-block { text-align: center; margin-bottom: 32px; }
        .title-block h2 { font-size: 1.4rem; font-weight: 500; margin-bottom: 8px; }
        .title-block p { color: var(--text-muted); font-size: 0.9rem; line-height: 1.5; }

        .btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            padding: 16px;
            border-radius: 14px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.2s ease;
            margin-bottom: 12px;
            backdrop-filter: blur(10px);
        }

        .btn:hover { background: rgba(255, 255, 255, 0.08); border-color: var(--glass-highlight); transform: translateY(-1px); }
        .btn:active { transform: translateY(1px); }
        
        .btn-primary { background: var(--text-main); color: var(--bg-dark); border: none; }
        .btn-primary:hover { background: #e0e0e0; box-shadow: 0 4px 15px rgba(255,255,255,0.15); }
        .btn-primary:disabled { background: #555; color: #888; cursor: not-allowed; box-shadow: none; transform: none; }

        .code-display-box {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 30px;
            text-align: center;
            margin-bottom: 24px;
        }
        
        .code-display {
            font-family: var(--font-mono);
            font-size: 3rem;
            font-weight: 500;
            letter-spacing: 12px;
            margin-right: -12px; /* Компенсация letter-spacing */
            color: var(--accent);
            text-shadow: 0 0 20px rgba(255,255,255,0.2);
        }

        .input-code {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            color: var(--accent);
            padding: 20px;
            border-radius: 14px;
            font-family: var(--font-mono);
            font-size: 2rem;
            text-align: center;
            letter-spacing: 8px;
            outline: none;
            width: 100%;
            transition: border-color 0.3s;
            margin-bottom: 24px;
        }
        .input-code:focus { border-color: var(--glass-highlight); background: rgba(0, 0, 0, 0.5); }
        .input-code::placeholder { color: rgba(255,255,255,0.1); }

        /* Чат */
        .chat-container { padding: 0 !important; }
        
        #messages {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scroll-behavior: smooth;
        }

        .msg-wrapper {
            display: flex;
            flex-direction: column;
            max-width: 85%;
            animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        .msg-wrapper.mine { align-self: flex-end; align-items: flex-end; }
        .msg-wrapper.theirs { align-self: flex-start; align-items: flex-start; }

        .msg-time {
            font-family: var(--font-mono);
            font-size: 0.6rem;
            color: var(--text-muted);
            margin-bottom: 4px;
            opacity: 0.7;
        }

        .msg {
            padding: 12px 18px;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.4;
            word-wrap: break-word;
            position: relative;
        }

        .mine .msg {
            background: var(--text-main);
            color: var(--bg-dark);
            border-bottom-right-radius: 4px;
        }

        .theirs .msg {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-bottom-left-radius: 4px;
            backdrop-filter: blur(10px);
        }

        .msg.system {
            align-self: center;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--glass-border);
            color: var(--text-muted);
            font-family: var(--font-mono);
            font-size: 0.7rem;
            padding: 6px 14px;
            border-radius: 20px;
            text-align: center;
            margin: 8px 0;
            max-width: 90%;
        }

        .chat-input-area {
            padding: 16px 20px;
            background: rgba(0,0,0,0.2);
            border-top: 1px solid var(--glass-border);
            display: flex;
            gap: 12px;
            padding-bottom: calc(16px + env(safe-area-inset-bottom));
        }

        .chat-input {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            padding: 14px 18px;
            border-radius: 24px;
            font-size: 0.95rem;
            font-family: var(--font-sans);
            outline: none;
            transition: all 0.3s;
        }
        .chat-input:focus { border-color: var(--glass-highlight); background: rgba(255, 255, 255, 0.08); }
        .chat-input::placeholder { color: var(--text-muted); }

        .btn-send {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--text-main);
            color: var(--bg-dark);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s, background 0.2s;
        }
        .btn-send:hover { transform: scale(1.05); background: #fff; }
        .btn-send:active { transform: scale(0.95); }
        .btn-send svg { margin-left: -2px; /* Оптическое выравнивание иконки */ }

        /* Фирменный подвал byMatvey */
        .brand-footer {
            text-align: center;
            padding: 16px;
            font-family: var(--font-mono);
            font-size: 0.7rem;
            color: var(--text-muted);
            letter-spacing: 0.05em;
            opacity: 0.6;
            transition: opacity 0.3s;
        }
        .brand-footer:hover { opacity: 1; }
        .brand-footer span { font-weight: 500; color: var(--text-main); }

        /* Утилиты и анимации */
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Кастомный скроллбар */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

        /* Адаптив для телефонов */
        @media (max-width: 600px) {
            .app-container { border-radius: 0; height: 100dvh; max-height: none; border: none; }
            .header { padding: 16px; }
            .screen { padding: 24px 16px; }
            .input-code, .chat-input { font-size: 16px; /* Предотвращает зум на iOS */ }
            .code-display { font-size: 2.5rem; letter-spacing: 8px; }
        }
    </style>
</head>
<body>

<div class="ambient-bg">
    <div class="ambient-blob blob-1"></div>
    <div class="ambient-blob blob-2"></div>
</div>

<div class="app-container">
    <div class="header">
        <div class="brand-title">
            <h1>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
                M-Link
            </h1>
            <div id="ping-ui" class="ping-indicator">
                <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>
                <span id="ping-value">-- ms</span>
            </div>
        </div>
        <div class="status-badge">
            <div class="status-dot" id="status-indicator"></div>
            <span id="status-label">OFFLINE</span>
        </div>
    </div>

    <div id="screen-home" class="screen active" style="justify-content: center;">
        <div class="title-block">
            <h2>mProtocol</h2>
            <p>Прямое P2P соединение.<br>Трафик не проходит через сервер.</p>
        </div>
        <button class="btn btn-primary" onclick="initHostSession()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            Создать сессию
        </button>
        <button class="btn" onclick="navToJoin()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h6v6"></path><path d="M10 14L21 3"></path><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path></svg>
            Подключиться
        </button>
    </div>

    <div id="screen-host" class="screen" style="justify-content: center;">
        <div class="title-block">
            <h2>Инициализация</h2>
            <p>Передайте этот код второму узлу для установки защищенного соединения.</p>
        </div>
        <div class="code-display-box">
            <div id="room-code-display" class="code-display">------</div>
        </div>
        <button class="btn" style="color: var(--danger); border-color: rgba(255,69,58,0.3);" onclick="cancelSession()">
            Прервать
        </button>
    </div>

    <div id="screen-guest" class="screen" style="justify-content: center;">
        <div class="title-block">
            <h2>Подключение</h2>
            <p>Введите 6-значный код сессии.</p>
        </div>
        <input type="tel" id="join-code-input" class="input-code" placeholder="000000" maxlength="6" autocomplete="off">
        <button id="btn-join" class="btn btn-primary" onclick="joinSession()">Установить связь</button>
        <button class="btn" onclick="cancelSession()">Назад</button>
    </div>

    <div id="screen-chat" class="screen chat-container">
        <div id="messages">
            <div class="msg system">Соединение установлено<br>E2EE канал активен</div>
        </div>
        <div class="chat-input-area">
            <input type="text" id="msg-input" class="chat-input" placeholder="Передача данных..." autocomplete="off">
            <button class="btn-send" onclick="sendMessage()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
        </div>
    </div>

    <div class="brand-footer" id="brand-footer">
        Engineered <span>by Matvey</span>
    </div>
</div>

<script>
    // --- КОНФИГУРАЦИЯ СЕТИ ---
    const SIGNALING_SERVER = 'https://mprotocol.onrender.com';
    
    // Добавлены TURN-серверы OpenRelay для пробития мобильных сетей
    const rtcConfig = { 
        iceServers: [
            { urls: "stun:stun.l.google.com:19302" },
            { urls: "stun:stun1.l.google.com:19302" },
            {
                urls: "turn:openrelay.metered.ca:80",
                username: "openrelayproject",
                credential: "openrelayproject"
            },
            {
                urls: "turn:openrelay.metered.ca:443",
                username: "openrelayproject",
                credential: "openrelayproject"
            },
            {
                urls: "turn:openrelay.metered.ca:443?transport=tcp",
                username: "openrelayproject",
                credential: "openrelayproject"
            }
        ] 
    };

    // --- ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ---
    let socket = null;
    let pc = null;
    let dc = null;
    let currentRoomId = null;
    let isHost = false;
    
    // Переменные для пинга
    let pingInterval;
    let isConnected = false;

    // --- ИНТЕРФЕЙСНЫЕ ФУНКЦИИ ---
    function navTo(screenId) {
        document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
        
        // Скрываем футер в чате для экономии места
        document.getElementById('brand-footer').style.display = (screenId === 'screen-chat') ? 'none' : 'block';
    }

    function navToJoin() {
        navTo('screen-guest');
        setTimeout(() => document.getElementById('join-code-input').focus(), 400);
    }

    function updateStatusUI(state) {
        const dot = document.getElementById('status-indicator');
        const label = document.getElementById('status-label');
        const pingUi = document.getElementById('ping-ui');

        dot.className = 'status-dot'; // сброс
        
        switch(state) {
            case 'offline':
                label.innerText = 'OFFLINE';
                pingUi.classList.remove('visible');
                break;
            case 'waiting':
                dot.classList.add('waiting');
                label.innerText = 'SIGNALING...';
                break;
            case 'connected':
                dot.classList.add('active');
                label.innerText = 'CONNECTED';
                pingUi.classList.add('visible');
                break;
        }
    }

    // --- ЛОГИКА SIGNALING СЕРВЕРА ---
    function connectSocket() {
        if (!socket) {
            updateStatusUI('waiting');
            socket = io(SIGNALING_SERVER, {
                path: "/socket.io/",
                transports: ["websocket"],
            });
            
            socket.on('connect_error', () => {
                sysLog("Ошибка сервера сигналинга. Проверьте Render.");
                updateStatusUI('offline');
            });

            // Обработка входящих сигналов (SDP и ICE)
            socket.on('signal', async (data) => {
                if (!pc) return;
                try {
                    if (data.type === 'offer') {
                        await pc.setRemoteDescription(new RTCSessionDescription(data));
                        const answer = await pc.createAnswer();
                        await pc.setLocalDescription(answer);
                        socket.emit('signal', { roomId: currentRoomId, data: answer });
                    } else if (data.type === 'answer') {
                        await pc.setRemoteDescription(new RTCSessionDescription(data));
                    } else if (data.candidate) {
                        await pc.addIceCandidate(new RTCIceCandidate(data));
                    }
                } catch (e) {
                    console.error("WebRTC Signal Error:", e);
                }
            });
        }
    }

    // --- ЛОГИКА ХОСТА ---
    function initHostSession() {
        connectSocket();
        isHost = true;
        navTo('screen-host');
        document.getElementById('room-code-display').innerText = '...';

        socket.emit('create-room');
        
        // Сервер вернул созданный 6-значный код
        socket.on('room-created', (id) => {
            currentRoomId = id;
            document.getElementById('room-code-display').innerText = id;
            setupWebRTC(true);
        });

        // Гость ввел код и зашел
        socket.on('guest-joined', async () => {
            sysLog("Узел обнаружен. Обмен ключами...");
            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            socket.emit('signal', { roomId: currentRoomId, data: offer });
        });
    }

    // --- ЛОГИКА ГОСТЯ ---
    function joinSession() {
        const input = document.getElementById('join-code-input');
        const code = input.value.trim();
        const btn = document.getElementById('btn-join');

        if (code.length !== 6) {
            input.style.borderColor = 'var(--danger)';
            setTimeout(() => input.style.borderColor = '', 1000);
            return;
        }

        btn.disabled = true;
        btn.innerText = "Подключение...";
        connectSocket();
        isHost = false;
        currentRoomId = code;

        socket.emit('join-room', code);

        socket.on('join-success', () => {
            setupWebRTC(false);
            sysLog("Код принят. Установка P2P соединения...");
        });

        socket.on('error', (msg) => {
            alert(msg || "Неверный код или сессия закрыта");
            btn.disabled = false;
            btn.innerText = "Установить связь";
            socket.disconnect();
            socket = null;
            updateStatusUI('offline');
        });
    }

    function cancelSession() {
        if (socket) { socket.disconnect(); socket = null; }
        if (pc) { pc.close(); pc = null; }
        if (pingInterval) clearInterval(pingInterval);
        
        currentRoomId = null;
        isConnected = false;
        updateStatusUI('offline');
        navTo('screen-home');
        document.getElementById('join-code-input').value = '';
        document.getElementById('btn-join').disabled = false;
        document.getElementById('btn-join').innerText = "Установить связь";
    }

    // --- WEBRTC CORE ---
    function setupWebRTC(isInitiator) {
        pc = new RTCPeerConnection(rtcConfig);
        
        // Отправка ICE кандидатов через сигналинг
        pc.onicecandidate = (e) => {
            if (e.candidate) {
                socket.emit('signal', { roomId: currentRoomId, data: e.candidate });
            }
        };

        // Отслеживание состояния соединения
        pc.oniceconnectionstatechange = () => {
            if(pc.iceConnectionState === 'connected' || pc.iceConnectionState === 'completed') {
                handleConnectionSuccess();
            } else if (pc.iceConnectionState === 'disconnected' || pc.iceConnectionState === 'failed') {
                handleConnectionDrop();
            }
        };

        if (isInitiator) {
            dc = pc.createDataChannel("mlink_channel", { ordered: true });
            setupDataChannel();
        } else {
            pc.ondatachannel = (e) => {
                dc = e.channel;
                setupDataChannel();
            };
        }
    }

    function setupDataChannel() {
        dc.onopen = () => {
            if(!isConnected) handleConnectionSuccess();
        };
        
        dc.onclose = () => {
            handleConnectionDrop();
        };

        dc.onmessage = (e) => {
            // Обработка системного пинга
            if (e.data.startsWith('__PING__')) {
                dc.send(e.data.replace('__PING__', '__PONG__'));
                return;
            }
            if (e.data.startsWith('__PONG__')) {
                const timestamp = parseInt(e.data.split(':')[1]);
                const latency = Date.now() - timestamp;
                document.getElementById('ping-value').innerText = `${latency} ms`;
                return;
            }
            
            // Обычное сообщение
            renderMessage(e.data, 'theirs');
        };
    }

    function handleConnectionSuccess() {
        isConnected = true;
        updateStatusUI('connected');
        navTo('screen-chat');
        
        // Запускаем расчет пинга
        pingInterval = setInterval(() => {
            if (dc && dc.readyState === 'open') {
                dc.send(`__PING__:${Date.now()}`);
            }
        }, 2000);

        // Отключаем сигналинг сервер - он больше не нужен
        if(socket) {
            socket.disconnect();
            socket = null;
            console.log("Signaling Server disconnected. E2EE active.");
        }
    }

    function handleConnectionDrop() {
        isConnected = false;
        clearInterval(pingInterval);
        updateStatusUI('offline');
        sysLog("Соединение с удаленным узлом разорвано.");
    }

    // --- ЧАТ И UI ---
    function getTime() {
        const now = new Date();
        return `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`;
    }

    function sendMessage() {
        const input = document.getElementById('msg-input');
        const text = input.value.trim();
        
        if (text && dc && dc.readyState === 'open') {
            dc.send(text);
            renderMessage(text, 'mine');
            input.value = '';
            input.focus();
        }
    }

    function renderMessage(text, sender) {
        const box = document.getElementById('messages');
        
        const wrapperDiv = document.createElement('div');
        wrapperDiv.className = `msg-wrapper ${sender}`;
        
        const msgDiv = document.createElement('div');
        msgDiv.className = `msg`;
        msgDiv.innerText = text;
        
        const metaDiv = document.createElement('div');
        metaDiv.className = 'msg-time';
        metaDiv.innerText = getTime();
        
        wrapperDiv.appendChild(msgDiv);
        wrapperDiv.appendChild(metaDiv);
        box.appendChild(wrapperDiv);
        
        box.scrollTop = box.scrollHeight;
    }

    function sysLog(text) {
        const box = document.getElementById('messages');
        const sysDiv = document.createElement('div');
        sysDiv.className = `msg system`;
        sysDiv.innerText = text;
        if(box) {
            box.appendChild(sysDiv);
            box.scrollTop = box.scrollHeight;
        }
    }

    // Обработка Enter в поле ввода
    document.getElementById('msg-input').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') sendMessage();
    });

    // Ограничение ввода кода только цифрами
    document.getElementById('join-code-input').addEventListener('input', function(e) {
        this.value = this.value.replace(/[^0-9]/g, '');
    });
</script>
</body>
</html>
